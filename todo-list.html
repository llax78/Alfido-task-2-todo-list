<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - Beach Background</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1920&q=80') 
                        center/cover 
                        no-repeat;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 100, 150, 0.35);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.92);
            padding: 35px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.35);
            max-width: 480px;
            width: 85%;
            border-radius: 18px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 28px;
            font-size: 2.3em;
            letter-spacing: 1px;
        }

        .input-section {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }

        #todoInput {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #d0d0d0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: all 0.25s;
        }

        #todoInput:focus {
            border-color: #00a8cc;
            box-shadow: 0 0 8px rgba(0, 168, 204, 0.25);
        }

        #addBtn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #00a8cc 0%, #0c7b93 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s;
            font-weight: 600;
        }

        #addBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 18px rgba(0, 168, 204, 0.45);
        }

        .todo-list {
            list-style: none;
            max-height: 380px;
            overflow-y: auto;
        }

        .todo-item {
            background: white;
            padding: 13px 18px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: all 0.25s;
            animation: slideIn 0.28s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .todo-item:hover {
            transform: translateX(3px);
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
        }

        .todo-item.completed {
            background: #e8f4f8;
            opacity: 0.75;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #888;
        }

        .todo-text {
            flex: 1;
            font-size: 15px;
            color: #333;
            cursor: pointer;
        }

        .actions {
            display: flex;
            gap: 6px;
        }

        .complete-btn, .delete-btn {
            padding: 7px 13px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .complete-btn {
            background: #27ae60;
            color: white;
        }

        .complete-btn:hover {
            background: #219a52;
            transform: scale(1.05);
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        .delete-btn:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        .stats {
            text-align: center;
            margin-top: 18px;
            padding-top: 18px;
            border-top: 2px solid #dcdcdc;
            color: #777;
            font-size: 13px;
        }

        .empty-message {
            text-align: center;
            color: #aaa;
            font-size: 15px;
            padding: 35px 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 Daily Tasks</h1>
        
        <div class="input-section">
            <input type="text" id="todoInput" placeholder="What needs to be done?">
            <button id="addBtn">Add</button>
        </div>

        <ul class="todo-list" id="todoList">
            <li class="empty-message">No tasks yet! Add one above 👆</li>
        </ul>

        <div class="stats" id="stats">
            Total: 0 | Completed: 0 | Pending: 0
        </div>
    </div>

    <script>
        const todoInput = document.getElementById('todoInput');
        const addBtn = document.getElementById('addBtn');
        const todoList = document.getElementById('todoList');
        const stats = document.getElementById('stats');

        let todos = [];

        function addTodo() {
            const text = todoInput.value.trim();
            if (text === '') {
                todoInput.focus();
                return;
            }

            const todo = {
                id: Date.now(),
                text: text,
                completed: false
            };

            todos.push(todo);
            todoInput.value = '';
            todoInput.focus();
            renderTodos();
            updateStats();
        }

        function deleteTodo(id) {
            todos = todos.filter(todo => todo.id !== id);
            renderTodos();
            updateStats();
        }

        function completeTodo(id) {
            todos = todos.map(todo => 
                todo.id === id ? { ...todo, completed: !todo.completed } : todo
            );
            renderTodos();
            updateStats();
        }

        function renderTodos() {
            if (todos.length === 0) {
                todoList.innerHTML = '<li class="empty-message">No tasks yet! Add one above 👆</li>';
                return;
            }

            todoList.innerHTML = '';

            todos.forEach(todo => {
                const todoItem = document.createElement('li');
                todoItem.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                
                const todoTextSpan = document.createElement('span');
                todoTextSpan.className = 'todo-text';
                todoTextSpan.textContent = todo.text;

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'actions';

                const completeBtn = document.createElement('button');
                completeBtn.className = 'complete-btn';
                completeBtn.textContent = '✓';

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = '✕';

                actionsDiv.appendChild(completeBtn);
                actionsDiv.appendChild(deleteBtn);
                todoItem.appendChild(todoTextSpan);
                todoItem.appendChild(actionsDiv);

                completeBtn.addEventListener('click', () => completeTodo(todo.id));
                deleteBtn.addEventListener('click', () => deleteTodo(todo.id));
                todoTextSpan.addEventListener('click', () => completeTodo(todo.id));

                todoList.appendChild(todoItem);
            });
        }

        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(todo => todo.completed).length;
            const pending = total - completed;
            stats.innerHTML = `Total: ${total} | Completed: ${completed} | Pending: ${pending}`;
        }

        addBtn.addEventListener('click', addTodo);
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        renderTodos();
        updateStats();
    </script>
</body>
</html>
